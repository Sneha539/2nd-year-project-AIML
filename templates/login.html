<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Locked - Secure Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --primary-glow: #ff3b3b;
            --bg-dark: #000000;
            --bg-gray: #18181c;
            --glass-bg: rgba(24, 24, 28, 0.72);
            --glass-blur: 18px;
            --border-glow: 0 0 24px 2px #ff000088;
            --input-bg: rgba(0,0,0,0.7);
            --input-border: #ff3b3b55;
            --input-focus: #ff0000;
            --button-bg: linear-gradient(90deg, #ff0000 0%, #ff3b3b 100%);
            --button-glow: 0 0 16px 2px #ff0000cc;
            --font: 'Poppins', Arial, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            background: var(--bg-dark);
            overflow: hidden;
        }

        /* Chains Layer */
        .chains-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Floating ash particles */
        .ash-layer {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            overflow: hidden;
        }
        .ash {
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 14px;
            border-radius: 999px;
            opacity: 0;
            background: linear-gradient(to top, rgba(255, 10, 10, 0.08), rgba(255, 70, 70, 1), rgba(255, 190, 190, 0.16));
            box-shadow: 0 0 12px rgba(255, 35, 35, 0.95), 0 0 24px rgba(255, 35, 35, 0.6), 0 0 38px rgba(255, 90, 90, 0.22);
            transform: translate3d(0, 0, 0) rotate(0deg);
            will-change: transform, opacity;
            animation-name: ashRise, ashFlicker;
            animation-timing-function: linear, ease-in-out;
            animation-iteration-count: infinite, infinite;
        }
        @keyframes ashRise {
            0% {
                transform: translate3d(0, 10vh, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.55;
            }
            60% {
                opacity: 0.42;
            }
            100% {
                transform: translate3d(var(--driftX, 18px), -110vh, 0) rotate(var(--spin, 18deg));
                opacity: 0;
            }
        }
        @keyframes ashFlicker {
            0%, 100% { filter: brightness(0.95) saturate(1.15); }
            50% { filter: brightness(1.4) saturate(1.35); }
        }
        .chain {
            position: absolute;
            width: 200vw;
            height: 32px;
            left: -20vw;
            opacity: 0.92;
            background-repeat: repeat-x;
            background-size: 120px 32px;
            filter: drop-shadow(0 2px 6px #40303001) brightness(1.1);
            will-change: transform;
        }
        /* Chain SVG backgrounds */
        .chain1 {
            top: 18vh;
            transform: rotate(-18deg);
            background-image: url('data:image/svg+xml;utf8,<svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow1"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter></defs><ellipse cx="16" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow1)"/><ellipse cx="16" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/><ellipse cx="44" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow1)"/><ellipse cx="44" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/><ellipse cx="72" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow1)"/><ellipse cx="72" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/><ellipse cx="100" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow1)"/><ellipse cx="100" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/></svg>');
            animation: chainMove1 22s linear infinite;
        }
        .chain2 {
            top: 38vh;
            transform: rotate(14deg);
            background-image: url('data:image/svg+xml;utf8,<svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow2"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter></defs><ellipse cx="16" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow2)"/><ellipse cx="16" cy="16" rx="14" ry="11" stroke="%23a0a0a0" stroke-width="3.5" fill="%23444"/><ellipse cx="44" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow2)"/><ellipse cx="44" cy="16" rx="14" ry="11" stroke="%23a0a0a0" stroke-width="3.5" fill="%23444"/><ellipse cx="72" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow2)"/><ellipse cx="72" cy="16" rx="14" ry="11" stroke="%23a0a0a0" stroke-width="3.5" fill="%23444"/><ellipse cx="100" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow2)"/><ellipse cx="100" cy="16" rx="14" ry="11" stroke="%23a0a0a0" stroke-width="3.5" fill="%23444"/></svg>');
            animation: chainMove2 28s linear infinite;
        }
        .chain3 {
            top: 58vh;
            transform: rotate(-11deg);
            background-image: url('data:image/svg+xml;utf8,<svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow3"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter></defs><ellipse cx="16" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow3)"/><ellipse cx="16" cy="16" rx="14" ry="11" stroke="%23d0d0d0" stroke-width="3.5" fill="%23444"/><ellipse cx="44" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow3)"/><ellipse cx="44" cy="16" rx="14" ry="11" stroke="%23d0d0d0" stroke-width="3.5" fill="%23444"/><ellipse cx="72" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow3)"/><ellipse cx="72" cy="16" rx="14" ry="11" stroke="%23d0d0d0" stroke-width="3.5" fill="%23444"/><ellipse cx="100" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow3)"/><ellipse cx="100" cy="16" rx="14" ry="11" stroke="%23d0d0d0" stroke-width="3.5" fill="%23444"/></svg>');
            animation: chainMove3 19s linear infinite;
        }
        .chain4 {
            top: 78vh;
            transform: rotate(8deg);
            background-image: url('data:image/svg+xml;utf8,<svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow4"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter></defs><ellipse cx="16" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow4)"/><ellipse cx="16" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/><ellipse cx="44" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow4)"/><ellipse cx="44" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/><ellipse cx="72" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow4)"/><ellipse cx="72" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/><ellipse cx="100" cy="16" rx="16" ry="12" stroke="%23888" stroke-width="5.5" fill="%23333" filter="url(%23shadow4)"/><ellipse cx="100" cy="16" rx="14" ry="11" stroke="%23b8b8b8" stroke-width="3.5" fill="%23444"/></svg>');
            animation: chainMove4 25s linear infinite;
        }
        @keyframes chainMove1 {
            0% { background-position-x: 0; }
            100% { background-position-x: 120vw; }
        }
        @keyframes chainMove2 {
            0% { background-position-x: 0; }
            100% { background-position-x: -120vw; }
        }
        @keyframes chainMove3 {
            0% { background-position-x: 0; }
            100% { background-position-x: 120vw; }
        }
        @keyframes chainMove4 {
            0% { background-position-x: 0; }
            100% { background-position-x: -120vw; }
        }

        /* Locks at intersections */
        .lock {
            position: absolute;
            width: 38px;
            height: 38px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 12px #ff0000cc);
            animation: lockPulse 2.2s infinite alternate;
        }
        .lock svg {
            width: 32px;
            height: 32px;
            display: block;
        }
        @keyframes lockPulse {
            0% { filter: drop-shadow(0 0 8px #ff0000cc) brightness(1.1); transform: scale(1);}
            100% { filter: drop-shadow(0 0 18px #ff3b3bcc) brightness(1.3); transform: scale(1.08);}
        }

        /* Centered Layout */
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Glassmorphism Card */
        .login-card {
            background: var(--glass-bg);
            box-shadow: 0 8px 32px 0 #ff000022, 0 1.5px 8px 0 #ff000033;
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: 22px;
            border: 2px solid #ff000088;
            box-shadow: 0 0 32px 4px #ff000055, 0 1.5px 8px 0 #ff000033;
            padding: 2.5rem 2rem 2rem 2rem;
            max-width: 350px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: cardIn 1.1s cubic-bezier(.68,-0.55,.27,1.55);
            transition: transform 0.3s cubic-bezier(.68,-0.55,.27,1.55), box-shadow 0.3s;
        }
        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(60px) scale(0.95) rotateY(8deg);}
            80% { opacity: 1; transform: translateY(-8px) scale(1.03) rotateY(-2deg);}
            100% { opacity: 1; transform: translateY(0) scale(1) rotateY(0);}
        }
        .login-card:hover {
            transform: perspective(600px) rotateY(7deg) scale(1.018);
            box-shadow: 0 0 48px 8px #ff0000cc, 0 1.5px 8px 0 #ff000033;
        }

        /* Central Lock Icon */
        .central-lock {
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,0,0,0.08);
            box-shadow: 0 0 24px 4px #ff000044, 0 0 0 4px #ff000022 inset;
            animation: lockPulse 2.2s infinite alternate;
        }
        .central-lock svg {
            width: 56px;
            height: 56px;
            display: block;
            filter: drop-shadow(0 0 12px #ff0000cc);
        }

        /* Title */
        .login-title {
            color: #fff;
            font-size: 1.45rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 8px #ff000033;
            text-align: center;
        }
        .locked-text {
            color: #fdfafa;
        }
        .subtitle-text {
            color: #ff9a9a;
            font-weight: 500;
        }

        /* Form */
        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }
        label {
            color: #ffb2b2;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="password"] {
            width: 94%;
            max-width: 94%;
            box-sizing: border-box;
            margin: 0 auto;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1.5px solid var(--input-border);
            background: var(--input-bg);
            color: #fff;
            font-size: 1rem;
            font-family: var(--font);
            outline: none;
            box-shadow: none;
            transition: border 0.2s, box-shadow 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border: 1.5px solid var(--input-focus);
            box-shadow: 0 0 12px 2px #ff000088;
            background: rgba(255,0,0,0.08);
        }

        /* Button */
        button[type="submit"] {
            margin-top: 0.5rem;
            width: 100%;
            padding: 0.9rem 0;
            border: none;
            border-radius: 12px;
            background: var(--button-bg);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: var(--button-glow);
            transition: background 0.2s, transform 0.18s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        button[type="submit"]:hover, button[type="submit"]:focus {
            background: linear-gradient(90deg, #ff3b3b 0%, #ff0000 100%);
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 0 32px 8px #ff0000cc;
        }
        button[type="submit"]:active {
            transform: scale(0.98);
            box-shadow: 0 0 16px 4px #ff000099;
        }
        button[type="submit"]::after {
            content: '';
            position: absolute;
            left: 50%; top: 50%;
            width: 0; height: 0;
            background: rgba(255,0,0,0.18);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            z-index: 0;
        }
        button[type="submit"]:active::after {
            width: 180%;
            height: 400%;
            transition: width 0.1s, height 0.1s;
        }

        .button-end-text {
            margin-top: 0.9rem;
            text-align: center;
            color: #ffffff;
            font-size: 0.92rem;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            opacity: 0.78;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.18);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem 0.7rem 1.2rem 0.7rem;
                max-width: 98vw;
            }
            .login-title {
                font-size: 1.1rem;
            }
            .central-lock {
                width: 54px; height: 54px;
            }
            .central-lock svg {
                width: 32px; height: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Chains and Locks Background -->
    <div class="chains-bg">
        <div class="chain chain1"></div>
        <div class="chain chain2"></div>
        <div class="chain chain3"></div>
        <div class="chain chain4"></div>
    </div>
    <div class="ash-layer" id="ash-layer"></div>

    <div class="container">
        <div class="login-card" id="login-card">
            <div class="central-lock">
                <svg viewBox="0 0 56 56" fill="none" aria-hidden="true">
                    <!-- Single ring -->
                    <circle cx="28" cy="28" r="25" stroke="#ff0000" stroke-width="2" opacity="0.2"/>

                    <!-- Realistic centered padlock -->
                    <!-- Shackle -->
                    <path d="M20 24v-3.5c0-4.4 3.6-8 8-8s8 3.6 8 8V24"
                          stroke="#ff3b3b" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

                    <!-- Body -->
                    <rect x="17" y="24" width="22" height="18" rx="5.5"
                          fill="#090909" stroke="#ff0000" stroke-width="2.4"/>

                    <!-- Keyhole -->
                    <circle cx="28" cy="32" r="2" fill="#ff3b3b"/>
                    <rect x="27" y="33.6" width="2" height="5.2" rx="1" fill="#ff3b3b"/>
                </svg>
            </div>
            <div class="login-title">System <span class="locked-text">Locked</span><br><span class="subtitle-text">Secure Access Required</span></div>
            <form method="POST">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>

                <button type="submit">Unlock</button>
                <div class="button-end-text">AI powered survillence system</div>
            </form>
        </div>
    </div>

    <!-- 3D Tilt Effect -->
    <script>
        // Tiny, thin, glowy red ash particles floating continuously
        const ashLayer = document.getElementById('ash-layer');
        const ashCount = 100;

        for (let i = 0; i < ashCount; i++) {
            const ash = document.createElement('span');
            ash.className = 'ash';

            const x = Math.random() * 100;
            const y = Math.random() * 115;

            const width = Math.random() < 0.82 ? (Math.random() * 1.3 + 0.8) : (Math.random() * 1.9 + 1.4);
            const height = Math.random() < 0.82 ? (Math.random() * 12 + 10) : (Math.random() * 4 + 3);

            const riseDuration = Math.random() * 11 + 12;
            const flickerDuration = Math.random() * 2 + 1.4;
            const delay = -Math.random() * riseDuration;

            const driftX = (Math.random() * 40 - 20).toFixed(1) + 'px';
            const spin = (Math.random() * 70 - 35).toFixed(1) + 'deg';

            ash.style.left = x + 'vw';
            ash.style.top = y + 'vh';
            ash.style.width = width.toFixed(2) + 'px';
            ash.style.height = height.toFixed(2) + 'px';
            ash.style.opacity = (Math.random() * 0.42 + 0.24).toFixed(2);
            ash.style.setProperty('--driftX', driftX);
            ash.style.setProperty('--spin', spin);
            ash.style.animationDuration = `${riseDuration}s, ${flickerDuration}s`;
            ash.style.animationDelay = `${delay}s, ${-Math.random() * flickerDuration}s`;

            ashLayer.appendChild(ash);
        }
    </script>
    <script>
        const card = document.getElementById('login-card');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * 7;
            const rotateY = ((x - centerX) / centerX) * 7;
            card.style.transform = `perspective(600px) rotateX(${-rotateX}deg) rotateY(${rotateY}deg) scale(1.018)`;
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = '';
        });
    </script>
</body>
</html>
